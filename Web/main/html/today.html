<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Fishing Map Pro</title>
  <link rel="stylesheet" href="../css/today_style.css">
  <link rel="stylesheet" href="../css/ocean_btn.css">
  <link href="https://fonts.googleapis.com/css2?family=Griffy&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
<div class="logo">
<a href="../index.html" style="text-decoration:none; color:white;">
    🎣 Fishing Map
</a>
</div>
  <nav>
    <a href="../index.html">ホーム</a>
    <a href="#" class="active">今日の釣果を記録</a>
    <a href="history.html">過去の釣果</a>
    <a href="map.html">釣果マップ</a>
  </nav>
  <div class="nav-buttons">
    <button class="outline-btn">ログイン</button>
    <button class="primary-btn small">会員登録</button>
  </div>
</header>

<section class="hero">

  <!-- <img src="../img/20251013_170953.jpg" alt="syasinn" class="hero-bg">
  <div class="overlay"></div> -->
  
  <div class="hero-content">
    <h1>🎣 今日の釣果を記録 🎣</h1>
    <h3 class="sub">釣れた情報を入力してデータを蓄積しよう</h3>

    <!-- ★ 入力カード -->
    <div class="catch-card">

      <div class="form-group">
        <label>魚種</label>
        <input type="text" placeholder="例：シーバス">
      </div>

      <div class="form-group">
        <label>サイズ (cm)</label>
        <input type="number" placeholder="例：65">
      </div>

      <div class="form-group">
        <label>釣り場所</label>
        <input type="text" placeholder="例：中海">
      </div>

      <div class="form-group">
        <label>使用ルアー・餌</label>
        <input type="text" placeholder="例：オキアミ">
      </div>

      <div class="form-group">
        <label>写真</label>
        <input type="file" id="photoInput" accept="image/*">
      </div>

      <div class="form-group">
        <label>メモ</label>
        <textarea placeholder="潮・時間・状況など"></textarea>
      </div>

      <a href="#" class="button button--3 save-btn" id="saveBtn">
        <span class="wave"></span>
        <span class="wave"></span>
        <span class="wave"></span>
        <span class="wave"></span>
        <span class="fish"></span>
        <span class="button__text">記録する</span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
        <span class="bubble"></span>
      </a>

    </div>
  </div>

</section>

<script src="../script/script.js"></script>
</body>
</html>
