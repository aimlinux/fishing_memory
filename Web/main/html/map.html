<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Fishing Map Pro</title>
  <link rel="stylesheet" href="../css/map_style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">🎣 Fishing Map</div>
  <nav>
    <a href="../index.html">ホーム</a>
    <a href="today.html">今日の釣果を記録</a>
    <a href="history.html">過去の釣果</a>
    <a href="#" class="active">釣果マップ</a>
  </nav>
  <div class="nav-buttons">
    <button class="outline-btn">ログイン</button>
    <button class="primary-btn small">会員登録</button>
  </div>
</header>

<section class="map-section">

  <h1>🗺 釣果マップ 🗺</h1>

  <!-- 地域選択 -->
  <div class="select-wrapper">
    <select id="regionSelect">
      <option value="">地域を選択</option>
      <option value="nakaumi" selected>中海</option>
      <option value="shimane">島根半島</option>
      <option value="umi">日本海</option>
    </select>
  </div>

  <!-- マップ表示エリア -->
  <div class="map-container">
    <img id="mapImage" src="../img/nakaumi.jpg" alt="">
    <div id="pinLayer"></div>
  </div>

</section>




<script src="../script/script.js"></script>
<script src="../script/map.js"></script>
</body>
</html>
